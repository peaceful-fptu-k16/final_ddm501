[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    "data",
    "mlruns",
    "models",
    "reports",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"dags/*.py" = ["E402", "I001"]
"scripts/*.py" = ["E402", "I001"]
