global:
  resolve_timeout: 5m

route:
  receiver: local-dev
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: local-webhook
      matchers:
        - severity=~"warning|critical"
      continue: true

receivers:
  - name: local-dev
  - name: local-webhook
    webhook_configs:
      - url: http://host.docker.internal:9099/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
