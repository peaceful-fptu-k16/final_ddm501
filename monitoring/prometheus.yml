global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - fastapi:8000

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
